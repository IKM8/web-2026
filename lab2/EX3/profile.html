<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — Социальная сеть</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="sidebar">
            <div class="sidebar__menu">
                <div class="sidebar__item">
                    <img src="menu_item1.jpg" alt="Меню 1" class="sidebar__icon">
                </div>
                <div class="sidebar__item">
                    <img src="menu_item2.jpg" alt="Меню 2" class="sidebar__icon">
                </div>
                <div class="sidebar__item">
                    <img src="menu_item3.jpg" alt="Меню 3" class="sidebar__icon">
                </div>
            </div>
        </div>
        
        <div class="profile">
            <div class="profile__top-block"></div>
            
            <div class="profile__avatar-wrapper">
                <img src="avatar1.jpg" alt="Ваня Денисов" class="profile__avatar">
            </div>
            
            <h1 class="profile__name">Ваня Денисов</h1>
            
            <div class="profile__bio">
                Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!
            </div>
            
            <div class="profile__stats">
                <img src="image_icon.jpg" alt="Посты" class="profile__stats-icon">
                <span class="profile__stats-count">43 поста</span>
            </div>
            
            <div class="profile__posts">
                <div class="profile__grid">
                    <div class="profile__grid-item">
                        <img src="post1.jpg" alt="Пост 1" class="profile__grid-image">
                    </div>
                    <div class="profile__grid-item">
                        <img src="post2.jpg" alt="Пост 2" class="profile__grid-image">
                    </div>
                    <div class="profile__grid-item">
                        <img src="post3.jpg" alt="Пост 3" class="profile__grid-image">
                    </div>
                    <div class="profile__grid-item">
                        <img src="post4.jpg" alt="Пост 4" class="profile__grid-image">
                    </div>
                    <div class="profile__grid-item">
                        <img src="post5.jpg" alt="Пост 5" class="profile__grid-image">
                    </div>
                    <div class="profile__grid-item">
                        <img src="post6.jpg" alt="Пост 6" class="profile__grid-image">
                    </div>
                    <div class="profile__grid-item profile__grid-item--partial">
                        <img src="post7.jpg" alt="Пост 7" class="profile__grid-image--original">
                    </div>
                    <div class="profile__grid-item profile__grid-item--partial">
                        <img src="post8.jpg" alt="Пост 8" class="profile__grid-image--original">
                    </div>
                    <div class="profile__grid-item profile__grid-item--partial">
                        <img src="post9.jpg" alt="Пост 9" class="profile__grid-image--original">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
