<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Главная — Социальная сеть</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="page">
            <div class="sidebar">
                <!-- nav -->
                <div class="sidebar__menu">
                    <!--a  -->
                    <!-- именование картинок -->
                    <div class="sidebar__item">
                        <!-- width, height -->
                        <img src="images/menu_item1.jpg" alt="Меню 1" class="sidebar__icon">
                    </div>
                    <div class="sidebar__item">
                        <img src="images/menu_item2.jpg" alt="Меню 2" class="sidebar__icon">
                    </div>
                    <div class="sidebar__item">
                        <img src="images/menu_item3.jpg" alt="Меню 3" class="sidebar__icon">
                    </div>
                </div>
            </div>
            <div class="feed">
                <div class="post">
                    <div class="post__header">
                        <div class="post__author">
                            <img src="images/avatar1.jpg" alt="Ваня Денисов" class="post__avatar">
                            <span class="post__author-name">Ваня Денисов</span>
                        </div>
                        <img src="images/edit.jpg" alt="Редактировать" class="post__edit">
                    </div>
                    <div class="post__media">
                        <img src="images/photo1.jpg" alt="Зимний пейзаж" class="post__image">
                        <div class="post__indicator">1/3</div>
                        <div class="post__slider">
                            <img src="images/slider_button.jpg" alt="Вперед" class="post__slider-icon">
                        </div>
                    </div>
                    <div class="post__actions">
                        <img src="images/like.jpg" alt="Лайк" class="post__like-icon">
                        <span class="post__likes-count">203</span>
                    </div>
                    <div class="post__text">
                        Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в гор...
                    </div>
                    <div class="post__more">ещё</div>
                    <div class="post__time">2 часа назад</div>
                </div>
                <div class="post">
                    <div class="post__header">
                        <div class="post__author">
                            <img src="images/avatar2.jpg" alt="Лиза Дёмина" class="post__avatar">
                            <span class="post__author-name">Лиза Дёмина</span>
                        </div>
                    </div>
                    <div class="post__media">
                        <img src="images/photo2.jpg" alt="Фото Лизы" class="post__image">
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
